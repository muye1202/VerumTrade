# ============================================================
# Verumtrade — Theme Taxonomy
# ============================================================
# This file seeds the Theme Graph and Supply-Chain Exposure Engine.
#
# To add a theme: copy an existing entry, give it a unique `id`,
# and fill in chain nodes, edges, and seed_exposures.
#
# To override or extend an existing theme: create data/themes/overrides.yaml
# with the same theme `id` and add/replace fields there.
#
# Node types:  theme_root | bottleneck | supply_layer | end_market | enabler
# Exposure types: direct | indirect | second_order
# ============================================================

themes:

  # ----------------------------------------------------------
  # 1. AI Memory and Storage
  # ----------------------------------------------------------
  - id: ai_memory_storage
    label: "AI memory and storage"
    description: >
      AI model training and inference demand is driving explosive growth in
      high-bandwidth memory (HBM) and enterprise storage, creating a severe
      bottleneck at the advanced memory tier.
    chain:
      - { id: ai_compute_demand, label: "AI compute demand", type: theme_root }
      - { id: hbm_memory, label: "HBM and advanced memory", type: bottleneck, is_bottleneck: true }
      - { id: enterprise_nand, label: "Enterprise SSD / NAND", type: supply_layer }
      - { id: dc_storage_systems, label: "Data-center storage systems", type: end_market }
      - { id: memory_equipment, label: "Memory fab equipment", type: enabler }
    edges:
      - [ai_compute_demand, hbm_memory]
      - [hbm_memory, enterprise_nand]
      - [enterprise_nand, dc_storage_systems]
      - [memory_equipment, hbm_memory]
    seed_exposures:
      - ticker: MU
        node: hbm_memory
        type: direct
        confidence: 0.92
        evidence:
          - "Only US producer of HBM; announced HBM3E ramp for NVDA and other hyperscalers"
          - "Management cited 'strong and growing' HBM demand in recent earnings"
          - "HBM revenue growing triple-digits year-over-year"
      - ticker: WDC
        node: enterprise_nand
        type: direct
        confidence: 0.85
        evidence:
          - "Enterprise SSD revenue acceleration driven by AI storage demand"
          - "Management highlighted pricing power in enterprise NAND segment"
      - ticker: STX
        node: dc_storage_systems
        type: direct
        confidence: 0.80
        evidence:
          - "Nearline HDD demand growing as AI training datasets expand"
          - "Seagate cited data-center customers pulling forward capacity"
      - ticker: SMCI
        node: dc_storage_systems
        type: indirect
        confidence: 0.72
        evidence:
          - "All-flash and NVMe storage server solutions for AI workloads"
      - ticker: LRCX
        node: memory_equipment
        type: direct
        confidence: 0.78
        evidence:
          - "Etch equipment critical for HBM stacking and NAND vertical layers"
          - "Memory equipment revenue correlated with HBM capacity expansion"

